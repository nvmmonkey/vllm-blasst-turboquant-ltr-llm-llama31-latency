name: ci

on:
  push:
  pull_request:

jobs:
  lint-test:
    name: ruff + pytest (CPU only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install (CPU-light core + dev tooling)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest, skip GPU-marked)
        run: pytest -q -m "not gpu"
